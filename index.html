<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Visual Quiz Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        /* Custom transitions */
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 dark:bg-gray-900 dark:text-gray-100 transition-colors duration-300 min-h-screen p-8">

    <!-- Header & Controls -->
    <header class="max-w-3xl mx-auto flex justify-between items-center mb-8">
        <h1 class="text-3xl font-bold">AI Visual Quiz Master</h1>
        <div class="flex gap-4 items-center">
            <button id="authBtn" class="text-sm underline">Login (Optional)</button>
            <select id="themeToggle" class="bg-white dark:bg-gray-800 border p-1 rounded text-sm">
                <option value="system">System</option>
                <option value="light">Light</option>
                <option value="dark">Dark</option>
            </select>
        </div>
    </header>

    <!-- Section 1: Setup -->
    <section id="setupSection" class="max-w-3xl mx-auto bg-white dark:bg-gray-800 p-6 rounded-lg shadow-md fade-in">
        <h2 class="text-xl font-semibold mb-4">Generate a New Quiz</h2>
        
        <div class="mb-4">
            <label class="block mb-2">Upload Source Material (Image)</label>
            <input type="file" id="imageUpload" accept="image/*" class="w-full border p-2 rounded">
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div>
                <label class="block mb-2">Number of Questions</label>
                <select id="questionCount" class="w-full border p-2 rounded dark:bg-gray-700">
                    <option value="fewer">Fewer (~3)</option>
                    <option value="standard" selected>Standard (~5)</option>
                    <option value="more">More (~10)</option>
                </select>
            </div>
            <div>
                <label class="block mb-2">Difficulty</label>
                <select id="difficulty" class="w-full border p-2 rounded dark:bg-gray-700">
                    <option value="easy">Easy</option>
                    <option value="medium" selected>Medium</option>
                    <option value="hard">Hard</option>
                </select>
            </div>
        </div>

        <button id="generateBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
            Generate Quiz
        </button>
        <p id="loadingText" class="hidden text-center mt-4 text-blue-500 animate-pulse">Analyzing image and generating quiz...</p>
    </section>

    <!-- Section 2: Active Quiz -->
    <section id="quizSection" class="max-w-3xl mx-auto hidden bg-white dark:bg-gray-800 p-6 rounded-lg shadow-md fade-in">
        <div class="flex justify-between items-center border-b pb-4 mb-4">
            <div>
                <span class="font-bold text-lg">Total Time: </span>
                <span id="globalTimer" class="font-mono text-xl text-blue-600">00:00</span>
            </div>
            <div>
                <span class="font-bold text-lg">Question Time: </span>
                <span id="questionTimer" class="font-mono text-xl text-red-500">00:00</span>
            </div>
        </div>

        <div id="questionContainer" class="mb-6">
            <h3 id="questionText" class="text-2xl font-bold mb-4">Question goes here?</h3>
            <div id="optionsContainer" class="space-y-3">
                <!-- Options injected by JS -->
            </div>
        </div>

        <div class="flex justify-between items-center mt-6">
            <button id="hintBtn" class="text-yellow-600 dark:text-yellow-400 underline">Show Hint</button>
            <button id="nextBtn" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded">Next Question</button>
        </div>
        <p id="hintText" class="hidden mt-4 italic text-gray-600 dark:text-gray-400"></p>
    </section>

    <!-- Section 3: Report Card -->
    <section id="reportSection" class="max-w-3xl mx-auto hidden bg-white dark:bg-gray-800 p-6 rounded-lg shadow-md fade-in">
        <h2 class="text-3xl font-bold mb-4 text-center">Quiz Complete!</h2>
        <div class="text-center mb-6">
            <p class="text-xl">Your Score: <span id="finalScore" class="font-bold text-blue-600">0/0</span></p>
            <p>Total Time Taken: <span id="finalTime" class="font-bold">00:00</span></p>
        </div>
        
        <div id="reviewContainer" class="space-y-4">
            <!-- Review items injected by JS -->
        </div>

        <div class="flex gap-4 mt-8 justify-center">
            <button id="saveBtn" class="bg-purple-600 text-white px-4 py-2 rounded">Save & Share Quiz</button>
            <button onclick="location.reload()" class="bg-gray-600 text-white px-4 py-2 rounded">Start Over</button>
        </div>
    </section>

    <script src="app.js"></script>
</body>
</html>
